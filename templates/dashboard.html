<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Spam Detector - Dashboard</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }

    body {
      background: linear-gradient(135deg, #0f1c24, #1b3039, #4a7485);
      color: rgb(240, 245, 248);
      min-height: 100vh;
      padding: 30px 15px;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
    }

    /* Header styling */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      flex-wrap: wrap;
      gap: 15px;
    }

    .header h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(45deg, #00c6ff, #0072ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-actions {
      display: flex;
      gap: 12px;
    }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
    }

    .btn-primary {
      background: linear-gradient(45deg, #00c6ff, #0072ff);
      color: #fff;
      box-shadow: 0 4px 15px rgba(0, 114, 255, 0.3);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 114, 255, 0.5);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .btn-danger {
      background: rgba(239, 68, 68, 0.2);
      color: #ef4444;
      border: 1px solid rgba(239, 68, 68, 0.4);
    }

    .btn-danger:hover {
      background: rgba(239, 68, 68, 0.3);
      transform: translateY(-2px);
    }

    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-bottom: 35px;
    }

    .stat-card {
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 18px;
      padding: 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
      transition: transform 0.3s ease;
    }

    .stat-card:hover {
      transform: translateY(-3px);
    }

    .stat-info h3 {
      font-size: 13px;
      font-weight: 500;
      color: #a0aec0;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .stat-info .stat-value {
      font-size: 26px;
      font-weight: 700;
      color: #fff;
    }

    .stat-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }

    .icon-blue { background: rgba(59, 130, 246, 0.15); color: #3b82f6; }
    .icon-green { background: rgba(16, 185, 129, 0.15); color: #10b981; }
    .icon-red { background: rgba(239, 68, 68, 0.15); color: #ef4444; }
    .icon-orange { background: rgba(245, 158, 11, 0.15); color: #f59e0b; }

    /* Dashboard Main Sections */
    .dashboard-sections {
      display: grid;
      grid-template-columns: 1fr;
      gap: 30px;
      margin-bottom: 30px;
    }

    @media (min-width: 900px) {
      .dashboard-sections {
        grid-template-columns: 350px 1fr;
      }
    }

    /* Left Sidebar: Categories breakdown */
    .panel {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      padding: 25px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
    }

    .panel-title {
      font-size: 17px;
      font-weight: 600;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      padding-bottom: 12px;
    }

    .category-list {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .category-item {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .category-header {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      font-weight: 500;
    }

    .cat-name { color: #cbd5e0; }
    .cat-stats { font-weight: 600; }

    .progress-bar-bg {
      height: 8px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      border-radius: 4px;
      transition: width 1s ease-in-out;
    }

    .bg-promotional { background: linear-gradient(90deg, #f59e0b, #fbbf24); }
    .bg-scam { background: linear-gradient(90deg, #8b5cf6, #a78bfa); }
    .bg-fraud { background: linear-gradient(90deg, #ec4899, #f472b6); }
    .bg-malware-links { background: linear-gradient(90deg, #3b82f6, #60a5fa); }

    /* Filters Section */
    .filter-bar {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 15px;
      padding: 15px 20px;
      margin-bottom: 20px;
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      align-items: center;
    }

    .search-input {
      flex: 1;
      min-width: 200px;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 8px 12px;
      color: #fff;
      font-size: 14px;
      outline: none;
      transition: border 0.3s;
    }

    .search-input:focus {
      border-color: #0072ff;
    }

    .filter-select {
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 8px 12px;
      color: #fff;
      font-size: 14px;
      outline: none;
      cursor: pointer;
    }

    .filter-select option {
      background: #1b3039;
      color: #fff;
    }

    /* Logs Table / List Container */
    .history-panel {
      display: flex;
      flex-direction: column;
    }

    .log-list {
      max-height: 480px;
      overflow-y: auto;
      padding-right: 5px;
    }

    /* Custom scrollbar */
    .log-list::-webkit-scrollbar, .history::-webkit-scrollbar {
      width: 6px;
    }
    .log-list::-webkit-scrollbar-track, .history::-webkit-scrollbar-track {
      background: rgba(0,0,0,0.1);
      border-radius: 3px;
    }
    .log-list::-webkit-scrollbar-thumb, .history::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
    }

    .log-item {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      transition: all 0.2s ease;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 15px;
    }

    .log-item:hover {
      background: rgba(255, 255, 255, 0.05);
      border-color: rgba(255, 255, 255, 0.1);
    }

    .log-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .log-message {
      font-size: 14.5px;
      font-weight: 400;
      line-height: 1.4;
      color: #e2e8f0;
      word-break: break-word;
    }

    .log-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .badge {
      padding: 3px 8px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .badge-ham { background: rgba(16, 185, 129, 0.15); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.3); }
    .badge-spam { background: rgba(239, 68, 68, 0.15); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3); }

    .badge-promotional { background: rgba(245, 158, 11, 0.15); color: #fbbf24; border: 1px solid rgba(245, 158, 11, 0.3); }
    .badge-scam { background: rgba(139, 92, 246, 0.15); color: #a78bfa; border: 1px solid rgba(139, 92, 246, 0.3); }
    .badge-fraud { background: rgba(236, 72, 153, 0.15); color: #f472b6; border: 1px solid rgba(236, 72, 153, 0.3); }
    .badge-malware-links { background: rgba(59, 130, 246, 0.15); color: #60a5fa; border: 1px solid rgba(59, 130, 246, 0.3); }

    .log-confidence {
      font-size: 12px;
      color: #a0aec0;
      font-weight: 500;
    }

    .log-time {
      font-size: 12px;
      color: #718096;
    }

    .btn-delete {
      background: none;
      border: none;
      color: #718096;
      cursor: pointer;
      padding: 6px;
      border-radius: 6px;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-delete:hover {
      color: #ef4444;
      background: rgba(239, 68, 68, 0.1);
    }

    .empty-state {
      text-align: center;
      padding: 40px;
      color: #a0aec0;
    }

    .empty-icon {
      font-size: 40px;
      margin-bottom: 12px;
    }
  </style>
</head>

<body>

<div class="container">
  
  <!-- Header -->
  <div class="header">
    <h1>📊 Detection History Dashboard</h1>
    <div class="header-actions">
      <a href="/" class="btn btn-secondary">
        <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
          <path fill-rule="evenodd" d="M15 8a.5.5 0 0 0-.5-.5H2.707l3.147-3.146a.5.5 0 1 0-.708-.708l-4 4a.5.5 0 0 0 0 .708l4 4a.5.5 0 0 0 .708-.708L2.707 8.5H14.5A.5.5 0 0 0 15 8z"/>
        </svg>
        Back to Detector
      </a>
      <button onclick="exportToCSV()" class="btn btn-secondary">
        <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
          <path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5z"/>
          <path d="M7.646 11.854a.5.5 0 0 0 .708 0l3-3a.5.5 0 0 0-.708-.708L8.5 10.293V1.5a.5.5 0 0 0-1 0v8.793L5.354 8.146a.5.5 0 1 0-.708.708l3 3z"/>
        </svg>
        Export CSV
      </button>
      <button onclick="clearAllHistory()" class="btn btn-danger">
        <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
          <path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0V6z"/>
          <path fill-rule="evenodd" d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1v1zM4.118 4 4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4H4.118zM2.5 3V2h11v1h-11z"/>
        </svg>
        Clear All
      </button>
    </div>
  </div>

  <!-- Stats cards -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-info">
        <h3>Total Checked</h3>
        <div id="stat-total" class="stat-value">0</div>
      </div>
      <div class="stat-icon icon-blue">🔍</div>
    </div>
    <div class="stat-card">
      <div class="stat-info">
        <h3>Spam Detected</h3>
        <div id="stat-spam" class="stat-value">0</div>
      </div>
      <div class="stat-icon icon-red">🚫</div>
    </div>
    <div class="stat-card">
      <div class="stat-info">
        <h3>Safe Messages</h3>
        <div id="stat-ham" class="stat-value">0</div>
      </div>
      <div class="stat-icon icon-green">✅</div>
    </div>
    <div class="stat-card">
      <div class="stat-info">
        <h3>Spam Ratio</h3>
        <div id="stat-ratio" class="stat-value">0%</div>
      </div>
      <div class="stat-icon icon-orange">📈</div>
    </div>
  </div>

  <!-- Sections Layout -->
  <div class="dashboard-sections">
    
    <!-- Left Sidebar: Spam Breakdown -->
    <div class="panel">
      <h2 class="panel-title">
        <span>📊 Spam breakdown</span>
      </h2>
      <div class="category-list">
        <div class="category-item">
          <div class="category-header">
            <span class="cat-name">Scam</span>
            <span id="pct-scam" class="cat-stats">0 (0%)</span>
          </div>
          <div class="progress-bar-bg">
            <div id="bar-scam" class="progress-bar bg-scam"></div>
          </div>
        </div>
        
        <div class="category-item">
          <div class="category-header">
            <span class="cat-name">Promotional</span>
            <span id="pct-promotional" class="cat-stats">0 (0%)</span>
          </div>
          <div class="progress-bar-bg">
            <div id="bar-promotional" class="progress-bar bg-promotional"></div>
          </div>
        </div>
        
        <div class="category-item">
          <div class="category-header">
            <span class="cat-name">Fraud</span>
            <span id="pct-fraud" class="cat-stats">0 (0%)</span>
          </div>
          <div class="progress-bar-bg">
            <div id="bar-fraud" class="progress-bar bg-fraud"></div>
          </div>
        </div>
        
        <div class="category-item">
          <div class="category-header">
            <span class="cat-name">Malware Links</span>
            <span id="pct-malware" class="cat-stats">0 (0%)</span>
          </div>
          <div class="progress-bar-bg">
            <div id="bar-malware" class="progress-bar bg-malware-links"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Right Side: Logs list -->
    <div class="panel history-panel">
      <h2 class="panel-title">
        <span>📜 Detection logs</span>
      </h2>
      
      <!-- Filters -->
      <div class="filter-bar">
        <input type="text" id="searchBox" class="search-input" placeholder="Search message content..." oninput="filterLogs()">
        
        <select id="filterLabel" class="filter-select" onchange="filterLogs()">
          <option value="all">All Labels</option>
          <option value="ham">Ham (Safe)</option>
          <option value="spam">Spam</option>
        </select>
        
        <select id="filterCategory" class="filter-select" onchange="filterLogs()">
          <option value="all">All Categories</option>
          <option value="Promotional">Promotional</option>
          <option value="Scam">Scam</option>
          <option value="Fraud">Fraud</option>
          <option value="Malware Links">Malware Links</option>
        </select>
      </div>

      <!-- Logs -->
      <div id="logList" class="log-list">
        <div class="empty-state">Loading logs...</div>
      </div>
    </div>

  </div>

</div>

<script>
let allRecords = [];

function loadDashboardData() {
    // 1. Fetch Stats
    fetch('/api/stats')
        .then(response => response.json())
        .then(stats => {
            document.getElementById("stat-total").innerText = stats.total;
            document.getElementById("stat-spam").innerText = stats.spam;
            document.getElementById("stat-ham").innerText = stats.ham;
            document.getElementById("stat-ratio").innerText = stats.spam_rate + "%";
            
            // Category Progress Bars
            const categories = ['Scam', 'Promotional', 'Fraud', 'Malware Links'];
            categories.forEach(cat => {
                const count = stats.categories[cat] || 0;
                const pct = stats.spam > 0 ? (count / stats.spam * 100).toFixed(0) : 0;
                const idSafe = cat.toLowerCase().replace(' ', '-');
                
                document.getElementById(`pct-${idSafe}`).innerText = `${count} (${pct}%)`;
                document.getElementById(`bar-${idSafe}`).style.width = `${pct}%`;
            });
        })
        .catch(err => console.error("Error loading stats:", err));

    // 2. Fetch History
    fetch('/api/history')
        .then(response => response.json())
        .then(data => {
            allRecords = data;
            filterLogs();
        })
        .catch(err => {
            document.getElementById("logList").innerHTML = "<div class='empty-state'>Failed to load detection logs</div>";
            console.error("Error loading logs:", err);
        });
}

function filterLogs() {
    const query = document.getElementById("searchBox").value.toLowerCase();
    const labelFilter = document.getElementById("filterLabel").value;
    const categoryFilter = document.getElementById("filterCategory").value;
    
    const container = document.getElementById("logList");
    container.innerHTML = "";
    
    const filtered = allRecords.filter(item => {
        const matchesQuery = item.message.toLowerCase().includes(query);
        const matchesLabel = labelFilter === 'all' || item.result.toLowerCase() === labelFilter;
        const matchesCategory = categoryFilter === 'all' || item.category === categoryFilter;
        return matchesQuery && matchesLabel && matchesCategory;
    });
    
    if (filtered.length === 0) {
        container.innerHTML = `
            <div class="empty-state">
                <div class="empty-icon">📂</div>
                <div>No matching detection logs found</div>
            </div>
        `;
        return;
    }
    
    filtered.forEach(item => {
        const isSpam = item.result.toLowerCase() === 'spam';
        const labelBadgeClass = isSpam ? 'badge-spam' : 'badge-ham';
        
        let categoryBadge = '';
        if (isSpam && item.category) {
            const catBadgeClass = 'badge-' + item.category.toLowerCase().replace(/\s+/g, '-');
            categoryBadge = `<span class="badge ${catBadgeClass}">${item.category}</span>`;
        }
        
        container.innerHTML += `
            <div class="log-item" id="record-${item.id}">
                <div class="log-content">
                    <div class="log-message">${escapeHtml(item.message)}</div>
                    <div class="log-meta">
                        <span class="badge ${labelBadgeClass}">${item.result}</span>
                        ${categoryBadge}
                        <span class="log-confidence">Confidence: ${item.confidence.toFixed(1)}%</span>
                        <span class="log-time">${item.timestamp}</span>
                    </div>
                </div>
                <button class="btn-delete" onclick="deleteRecord(${item.id})" title="Delete entry">
                    <svg width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
                        <path d="M5.5 5.5a.5.5 0 0 1 .5-.5h4a.5.5 0 0 1 .5.5v9a.5.5 0 0 1-.5.5h-4a.5.5 0 0 1-.5-.5v-9z"/>
                        <path d="M.5 3a.5.5 0 0 1 .5-.5h14a.5.5 0 0 1 0 1H.5A.5.5 0 0 1 .5 3zm2.22 1.053 1.053 11.233A1.5 1.5 0 0 0 5.26 16h5.48a1.5 1.5 0 0 0 1.488-1.714L13.28 4H2.72z"/>
                    </svg>
                </button>
            </div>
        `;
    });
}

function deleteRecord(id) {
    if (!confirm("Are you sure you want to delete this log entry?")) return;
    
    fetch(`/api/delete/${id}`, { method: 'POST' })
        .then(response => response.json())
        .then(result => {
            if (result.status === 'success') {
                // Refresh dashboard
                loadDashboardData();
            } else {
                alert("Error deleting record: " + result.message);
            }
        })
        .catch(err => alert("Error deleting record: " + err));
}

function clearAllHistory() {
    if (!confirm("⚠️ WARNING: This will delete ALL history log entries. This action cannot be undone. Proceed?")) return;
    
    fetch('/api/clear_all', { method: 'POST' })
        .then(response => response.json())
        .then(result => {
            if (result.status === 'success') {
                loadDashboardData();
            } else {
                alert("Error clearing history: " + result.message);
            }
        })
        .catch(err => alert("Error clearing history: " + err));
}

function exportToCSV() {
    if (allRecords.length === 0) {
        alert("No records to export.");
        return;
    }
    
    let csvContent = "data:text/csv;charset=utf-8,";
    csvContent += "ID,Timestamp,Message,Result,Category,Confidence (%)\n";
    
    allRecords.forEach(item => {
        const id = item.id;
        const time = item.timestamp;
        const msg = `"${item.message.replace(/"/g, '""')}"`;
        const res = item.result.toUpperCase();
        const cat = item.category ? item.category : "N/A";
        const conf = item.confidence.toFixed(1);
        
        csvContent += `${id},${time},${msg},${res},${cat},${conf}\n`;
    });
    
    const encodedUri = encodeURI(csvContent);
    const link = document.createElement("a");
    link.setAttribute("href", encodedUri);
    link.setAttribute("download", "spam_detector_history.csv");
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}

function escapeHtml(text) {
    const map = {
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
    };
    return text.replace(/[&<>"']/g, function(m) { return map[m]; });
}

// Load data when page loads
window.onload = loadDashboardData;
</script>

</body>
</html>
