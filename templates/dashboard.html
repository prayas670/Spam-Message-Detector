<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Spam Detector - Analytics</title>

  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Outfit', sans-serif; }

    body {
      background-color: #090e17; /* Deep slate blue */
      color: #ffffff;
      min-height: 100vh;
      padding: 40px 20px;
      overflow-x: hidden;
      position: relative;
    }

    /* Professional Aurora Background Effect */
    .aurora-bg {
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      overflow: hidden;
      z-index: -1;
      filter: blur(90px);
      opacity: 0.8;
    }

    .blob {
      position: absolute;
      border-radius: 50%;
      animation: float 20s infinite alternate ease-in-out;
    }

    .blob-1 {
      width: 50vw; height: 50vw;
      background: radial-gradient(circle, rgba(37, 99, 235, 0.4) 0%, transparent 70%); /* Deep Blue */
      top: -10%; left: -10%;
      animation-delay: 0s;
    }
    
    .blob-2 {
      width: 45vw; height: 45vw;
      background: radial-gradient(circle, rgba(139, 92, 246, 0.3) 0%, transparent 70%); /* Purple/Indigo */
      bottom: -20%; right: -10%;
      animation-delay: -5s;
    }

    .blob-3 {
      width: 60vw; height: 60vw;
      background: radial-gradient(circle, rgba(14, 165, 233, 0.3) 0%, transparent 70%); /* Cyan/Teal */
      top: 20%; left: 30%;
      animation-delay: -10s;
    }

    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(10%, 15%) scale(1.1); }
      100% { transform: translate(-10%, -5%) scale(0.9); }
    }

    /* Organic Decor Shape */
    .organic-shape {
      position: fixed;
      width: 400px; height: 400px;
      background: linear-gradient(135deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
      border: 1px solid rgba(255,255,255,0.02);
      border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
      backdrop-filter: blur(10px);
      z-index: -1;
      bottom: 5%; right: 5%;
      animation: morph 20s ease-in-out infinite alternate;
    }

    @keyframes morph {
      0% { border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; transform: rotate(0deg); }
      100% { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; transform: rotate(90deg); }
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      animation: softPop 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
      transform: translateY(20px);
    }

    @keyframes softPop {
      to { opacity: 1; transform: translateY(0); }
    }

    /* Header styling */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
      flex-wrap: wrap;
      gap: 20px;
    }

    .header h1 {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: #ffffff;
      text-shadow: 0 4px 10px rgba(0,0,0,0.8);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-actions {
      display: flex;
      gap: 15px;
    }

    /* Clay Buttons */
    .btn {
      padding: 14px 24px;
      border: none;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s ease;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      background: rgba(20, 30, 45, 0.6);
      backdrop-filter: blur(15px);
      color: #fff;
      box-shadow: 
        6px 6px 15px rgba(0,0,0,0.3), 
        -3px -3px 10px rgba(255,255,255,0.05),
        inset 2px 2px 8px rgba(255,255,255,0.1),
        inset -2px -2px 8px rgba(0,0,0,0.3);
    }

    .btn:hover {
      background: rgba(30, 40, 60, 0.8);
      transform: translateY(-2px);
      box-shadow: 
        8px 8px 20px rgba(0,0,0,0.4), 
        -4px -4px 12px rgba(255,255,255,0.08),
        inset 2px 2px 10px rgba(255,255,255,0.15),
        inset -2px -2px 10px rgba(0,0,0,0.4);
    }

    .btn:active {
      transform: translateY(2px);
      box-shadow: 
        2px 2px 5px rgba(0,0,0,0.2), 
        inset 4px 4px 15px rgba(0,0,0,0.4),
        inset -2px -2px 8px rgba(255,255,255,0.05);
    }

    .btn-danger {
      background: rgba(220, 38, 38, 0.6);
    }

    .btn-danger:hover {
      background: rgba(239, 68, 68, 0.8);
    }

    /* Stats Grid with Claymorphism */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 25px;
      margin-bottom: 45px;
    }

    .stat-card {
      background: rgba(15, 20, 30, 0.75);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      /* Organic shape for stat cards */
      border-radius: 35px 25px 40px 20px;
      padding: 30px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      /* Soft clay shadows */
      box-shadow: 
        10px 10px 25px rgba(0, 0, 0, 0.3), 
        -5px -5px 20px rgba(255, 255, 255, 0.03),
        inset 3px 3px 10px rgba(255, 255, 255, 0.05),
        inset -3px -3px 15px rgba(0, 0, 0, 0.4);
      transition: all 0.3s ease;
      animation: softPop 0.6s ease forwards;
      opacity: 0;
      transform: translateY(20px);
    }
    
    .stats-grid .stat-card:nth-child(1) { border-radius: 25px 40px 20px 35px; animation-delay: 0.1s; }
    .stats-grid .stat-card:nth-child(2) { border-radius: 35px 20px 40px 25px; animation-delay: 0.2s; }
    .stats-grid .stat-card:nth-child(3) { border-radius: 20px 35px 25px 40px; animation-delay: 0.3s; }
    .stats-grid .stat-card:nth-child(4) { border-radius: 40px 25px 35px 20px; animation-delay: 0.4s; }

    .stat-card:hover {
      transform: translateY(-5px) scale(1.02);
      box-shadow: 
        12px 12px 30px rgba(0, 0, 0, 0.4), 
        -5px -5px 20px rgba(255, 255, 255, 0.05),
        inset 3px 3px 15px rgba(255, 255, 255, 0.08),
        inset -3px -3px 15px rgba(0, 0, 0, 0.5);
      background: rgba(20, 25, 35, 0.85);
    }

    .stat-info h3 {
      font-size: 14px;
      font-weight: 600;
      color: #ffffff;
      text-transform: uppercase;
      margin-bottom: 8px;
      letter-spacing: 1px;
    }

    .stat-info .stat-value {
      font-size: 36px;
      font-weight: 700;
      color: #fff;
      text-shadow: 0 2px 10px rgba(0,0,0,0.3);
    }

    /* Soft Icon Bubbles */
    .stat-icon {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      box-shadow: 
        inset 4px 4px 10px rgba(255,255,255,0.2), 
        inset -4px -4px 10px rgba(0,0,0,0.3),
        4px 4px 10px rgba(0,0,0,0.2);
    }

    .icon-blue { background: #3b82f6; }
    .icon-green { background: #10b981; }
    .icon-red { background: #ef4444; }
    .icon-orange { background: #f59e0b; }

    /* Dashboard Main Sections */
    .dashboard-sections {
      display: grid;
      grid-template-columns: 1fr;
      gap: 35px;
    }

    @media (min-width: 950px) {
      .dashboard-sections {
        grid-template-columns: 380px 1fr;
      }
    }

    /* Panels - Claymorphism */
    .panel {
      background: rgba(15, 20, 30, 0.75);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border-radius: 35px;
      padding: 35px;
      box-shadow: 
        15px 15px 40px rgba(0, 0, 0, 0.4), 
        -10px -10px 30px rgba(255, 255, 255, 0.03),
        inset 4px 4px 15px rgba(255, 255, 255, 0.05),
        inset -4px -4px 20px rgba(0, 0, 0, 0.5);
      animation: softPop 0.8s ease forwards 0.5s;
      opacity: 0;
      transform: translateY(20px);
    }

    .panel-title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 30px;
      display: flex;
      align-items: center;
      gap: 12px;
      color: #fff;
    }
    
    .panel-title span {
      background: rgba(0,0,0,0.2);
      padding: 10px 15px;
      border-radius: 20px;
      box-shadow: inset 2px 2px 8px rgba(0,0,0,0.3);
    }

    /* Category Progress Bars */
    .category-list {
      display: flex;
      flex-direction: column;
      gap: 25px;
    }

    .category-item {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .category-header {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      font-weight: 500;
    }

    .cat-name { color: #ffffff; }
    .cat-stats { font-weight: 600; color: #ffffff; }

    /* Pill shaped progress bars */
    .progress-bar-bg {
      height: 14px;
      background: rgba(10, 15, 25, 0.6);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: inset 3px 3px 8px rgba(0,0,0,0.5), inset -2px -2px 5px rgba(255,255,255,0.05);
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      border-radius: 10px;
      transition: width 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      /* Thick bubble look inside progress bar */
      box-shadow: inset 2px 2px 5px rgba(255,255,255,0.3), inset -2px -2px 5px rgba(0,0,0,0.2);
    }

    .bg-promotional { background: #f59e0b; }
    .bg-scam { background: #8b5cf6; }
    .bg-fraud { background: #ef4444; }
    .bg-malware-links { background: #3b82f6; }

    /* Filters Section */
    .filter-bar {
      background: rgba(10, 15, 25, 0.4);
      border-radius: 25px;
      padding: 20px;
      margin-bottom: 25px;
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      align-items: center;
      box-shadow: inset 4px 4px 15px rgba(0,0,0,0.4);
    }

    .search-input, .filter-select {
      flex: 1;
      min-width: 200px;
      background: rgba(20, 30, 45, 0.6);
      border: none;
      border-radius: 15px;
      padding: 14px 20px;
      color: #fff;
      font-size: 14px;
      outline: none;
      transition: all 0.3s ease;
      box-shadow: 
        inset 3px 3px 10px rgba(0,0,0,0.4), 
        inset -2px -2px 8px rgba(255,255,255,0.03);
    }
    
    .search-input::placeholder { color: rgba(255,255,255,0.7); }

    .search-input:focus, .filter-select:focus {
      background: rgba(30, 40, 60, 0.8);
      box-shadow: 
        inset 5px 5px 15px rgba(0,0,0,0.5), 
        inset -3px -3px 10px rgba(255,255,255,0.05),
        0 0 15px rgba(59, 130, 246, 0.1);
    }

    .filter-select option {
      background: #1e293b;
      color: #fff;
    }

    /* Logs Table / List Container */
    .history-panel {
      display: flex;
      flex-direction: column;
    }

    .log-list {
      max-height: 550px;
      overflow-y: auto;
      padding-right: 15px;
      padding-bottom: 10px;
    }

    /* Custom scrollbar */
    .log-list::-webkit-scrollbar { width: 8px; }
    .log-list::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); border-radius: 10px; }
    .log-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    .log-list::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

    .log-item {
      background: rgba(255, 255, 255, 0.04);
      border-radius: 25px;
      padding: 22px;
      margin-bottom: 18px;
      transition: all 0.3s ease;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 15px;
      box-shadow: 
        4px 4px 15px rgba(0,0,0,0.2), 
        -2px -2px 10px rgba(255,255,255,0.02),
        inset 1px 1px 5px rgba(255,255,255,0.05);
    }

    .log-item:hover {
      background: rgba(255, 255, 255, 0.08);
      transform: translateY(-2px);
      box-shadow: 
        6px 6px 20px rgba(0,0,0,0.3), 
        -3px -3px 12px rgba(255,255,255,0.04),
        inset 2px 2px 8px rgba(255,255,255,0.08);
    }

    .log-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .log-message {
      font-size: 15px;
      font-weight: 500;
      line-height: 1.6;
      color: #ffffff;
      word-break: break-word;
    }

    .log-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      background: rgba(0,0,0,0.2);
      padding: 10px 15px;
      border-radius: 15px;
      box-shadow: inset 2px 2px 8px rgba(0,0,0,0.3);
    }

    /* Organic Category Badges */
    .badge {
      display: inline-block;
      padding: 5px 12px;
      border-radius: 20px 10px 20px 10px; /* Organic blob border radius */
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      box-shadow: 0 3px 8px rgba(0,0,0,0.3);
      color: #fff;
    }
    
    .badge-ham { background: #10b981; }
    .badge-spam { background: #ef4444; }

    .badge-promotional { background: #f59e0b; }
    .badge-scam { background: #8b5cf6; }
    .badge-fraud { background: #ef4444; }
    .badge-malware-links { background: #3b82f6; }

    .log-confidence {
      font-size: 12px;
      color: #cccccc;
      font-weight: 500;
    }

    .log-time {
      font-size: 12px;
      color: #bbbbbb;
    }

    .btn-delete {
      background: rgba(220, 38, 38, 0.15);
      color: #fca5a5;
      border: none;
      cursor: pointer;
      padding: 10px;
      border-radius: 12px;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: inset 2px 2px 5px rgba(0,0,0,0.2);
    }

    .btn-delete:hover {
      color: #fff;
      background: rgba(220, 38, 38, 0.8);
      transform: scale(1.05);
      box-shadow: 0 4px 12px rgba(220, 38, 38, 0.4), inset 2px 2px 5px rgba(255,255,255,0.2);
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #cccccc;
      background: rgba(0,0,0,0.1);
      border-radius: 25px;
      box-shadow: inset 4px 4px 15px rgba(0,0,0,0.3);
    }

    .empty-icon {
      font-size: 54px;
      margin-bottom: 15px;
      opacity: 0.5;
      filter: drop-shadow(0 4px 10px rgba(0,0,0,0.2));
    }
  </style>
</head>

<body>

<!-- Professional Aurora Background -->
<div class="aurora-bg">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
</div>

<!-- Organic Decorative Shape -->
<div class="organic-shape"></div>

<div class="container">
  
  <!-- Header -->
  <div class="header">
    <h1>📈 Content Analytics</h1>
    <div class="header-actions">
      <a href="/" class="btn btn-secondary">
        <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
          <path fill-rule="evenodd" d="M15 8a.5.5 0 0 0-.5-.5H2.707l3.147-3.146a.5.5 0 1 0-.708-.708l-4 4a.5.5 0 0 0 0 .708l4 4a.5.5 0 0 0 .708-.708L2.707 8.5H14.5A.5.5 0 0 0 15 8z"/>
        </svg>
        Return to Detector
      </a>
      <button onclick="exportToCSV()" class="btn btn-secondary">
        <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
          <path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5z"/>
          <path d="M7.646 11.854a.5.5 0 0 0 .708 0l3-3a.5.5 0 0 0-.708-.708L8.5 10.293V1.5a.5.5 0 0 0-1 0v8.793L5.354 8.146a.5.5 0 1 0-.708.708l3 3z"/>
        </svg>
        Export Report
      </button>
      <button onclick="clearAllHistory()" class="btn btn-danger">
        <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
          <path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0V6z"/>
          <path fill-rule="evenodd" d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1v1zM4.118 4 4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4H4.118zM2.5 3V2h11v1h-11z"/>
        </svg>
        Clear Logs
      </button>
    </div>
  </div>

  <!-- Stats cards -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-info">
        <h3>Total Scanned</h3>
        <div id="stat-total" class="stat-value">0</div>
      </div>
      <div class="stat-icon icon-blue">🔍</div>
    </div>
    <div class="stat-card">
      <div class="stat-info">
        <h3>Spam Detected</h3>
        <div id="stat-spam" class="stat-value">0</div>
      </div>
      <div class="stat-icon icon-red">🚫</div>
    </div>
    <div class="stat-card">
      <div class="stat-info">
        <h3>Safe Content</h3>
        <div id="stat-ham" class="stat-value">0</div>
      </div>
      <div class="stat-icon icon-green">✅</div>
    </div>
    <div class="stat-card">
      <div class="stat-info">
        <h3>Spam Ratio</h3>
        <div id="stat-ratio" class="stat-value">0%</div>
      </div>
      <div class="stat-icon icon-orange">📈</div>
    </div>
  </div>

  <!-- Sections Layout -->
  <div class="dashboard-sections">
    
    <!-- Left Sidebar: Spam Breakdown -->
    <div class="panel">
      <h2 class="panel-title">
        <span>📊 Threat Breakdown</span>
      </h2>
      <div class="category-list">
        <div class="category-item">
          <div class="category-header">
            <span class="cat-name">Scam</span>
            <span id="pct-scam" class="cat-stats">0 (0%)</span>
          </div>
          <div class="progress-bar-bg">
            <div id="bar-scam" class="progress-bar bg-scam"></div>
          </div>
        </div>
        
        <div class="category-item">
          <div class="category-header">
            <span class="cat-name">Promotional</span>
            <span id="pct-promotional" class="cat-stats">0 (0%)</span>
          </div>
          <div class="progress-bar-bg">
            <div id="bar-promotional" class="progress-bar bg-promotional"></div>
          </div>
        </div>
        
        <div class="category-item">
          <div class="category-header">
            <span class="cat-name">Fraud</span>
            <span id="pct-fraud" class="cat-stats">0 (0%)</span>
          </div>
          <div class="progress-bar-bg">
            <div id="bar-fraud" class="progress-bar bg-fraud"></div>
          </div>
        </div>
        
        <div class="category-item">
          <div class="category-header">
            <span class="cat-name">Malware Links</span>
            <span id="pct-malware" class="cat-stats">0 (0%)</span>
          </div>
          <div class="progress-bar-bg">
            <div id="bar-malware" class="progress-bar bg-malware-links"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Right Side: Logs list -->
    <div class="panel history-panel">
      <h2 class="panel-title">
        <span>📜 Scan Logs</span>
      </h2>
      
      <!-- Filters -->
      <div class="filter-bar">
        <input type="text" id="searchBox" class="search-input" placeholder="Search message content..." oninput="filterLogs()">
        
        <select id="filterLabel" class="filter-select" onchange="filterLogs()">
          <option value="all">All Statuses</option>
          <option value="ham">Safe (Ham)</option>
          <option value="spam">Threat (Spam)</option>
        </select>
        
        <select id="filterCategory" class="filter-select" onchange="filterLogs()">
          <option value="all">All Threats</option>
          <option value="Promotional">Promotional</option>
          <option value="Scam">Scam</option>
          <option value="Fraud">Fraud</option>
          <option value="Malware Links">Malware Links</option>
        </select>
      </div>

      <!-- Logs -->
      <div id="logList" class="log-list">
        <div class="empty-state">Loading scan logs...</div>
      </div>
    </div>

  </div>

</div>

<script>
let allRecords = [];

function loadDashboardData() {
    // 1. Fetch Stats
    fetch('/api/stats')
        .then(response => response.json())
        .then(stats => {
            document.getElementById("stat-total").innerText = stats.total;
            document.getElementById("stat-spam").innerText = stats.spam;
            document.getElementById("stat-ham").innerText = stats.ham;
            document.getElementById("stat-ratio").innerText = stats.spam_rate + "%";
            
            // Category Progress Bars
            const categories = ['Scam', 'Promotional', 'Fraud', 'Malware Links'];
            categories.forEach(cat => {
                const count = stats.categories[cat] || 0;
                const pct = stats.spam > 0 ? (count / stats.spam * 100).toFixed(0) : 0;
                const idSafe = cat.toLowerCase().replace(' ', '-');
                
                document.getElementById(`pct-${idSafe}`).innerText = `${count} (${pct}%)`;
                
                // Animate progress bars after a slight delay
                setTimeout(() => {
                    document.getElementById(`bar-${idSafe}`).style.width = `${pct}%`;
                }, 800);
            });
        })
        .catch(err => console.error("Error loading stats:", err));

    // 2. Fetch History
    fetch('/api/history')
        .then(response => response.json())
        .then(data => {
            allRecords = data;
            filterLogs();
        })
        .catch(err => {
            document.getElementById("logList").innerHTML = "<div class='empty-state'>Failed to load detection logs</div>";
            console.error("Error loading logs:", err);
        });
}

function filterLogs() {
    const query = document.getElementById("searchBox").value.toLowerCase();
    const labelFilter = document.getElementById("filterLabel").value;
    const categoryFilter = document.getElementById("filterCategory").value;
    
    const container = document.getElementById("logList");
    container.innerHTML = "";
    
    const filtered = allRecords.filter(item => {
        const matchesQuery = item.message.toLowerCase().includes(query);
        const matchesLabel = labelFilter === 'all' || item.result.toLowerCase() === labelFilter;
        const matchesCategory = categoryFilter === 'all' || item.category === categoryFilter;
        return matchesQuery && matchesLabel && matchesCategory;
    });
    
    if (filtered.length === 0) {
        container.innerHTML = `
            <div class="empty-state">
                <div class="empty-icon">📂</div>
                <div>No matching logs found.</div>
            </div>
        `;
        return;
    }
    
    filtered.forEach((item, index) => {
        const isSpam = item.result.toLowerCase() === 'spam';
        const labelBadgeClass = isSpam ? 'badge-spam' : 'badge-ham';
        
        let categoryBadge = '';
        if (isSpam && item.category) {
            const catBadgeClass = 'badge-' + item.category.toLowerCase().replace(/\s+/g, '-');
            categoryBadge = `<span class="badge ${catBadgeClass}">${item.category}</span>`;
        }
        
        container.innerHTML += `
            <div class="log-item" id="record-${item.id}" style="animation: softPop 0.5s ease forwards ${index * 0.05}s; opacity: 0; transform: translateY(15px) scale(0.98);">
                <div class="log-content">
                    <div class="log-message">${escapeHtml(item.message)}</div>
                    <div class="log-meta">
                        <span class="badge ${labelBadgeClass}">${item.result}</span>
                        ${categoryBadge}
                        <span class="log-confidence">Certainty: <strong style="color:#fff;">${item.confidence.toFixed(1)}%</strong></span>
                        <span class="log-time">${item.timestamp}</span>
                    </div>
                </div>
                <button class="btn-delete" onclick="deleteRecord(${item.id})" title="Remove log">
                    <svg width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
                        <path d="M5.5 5.5a.5.5 0 0 1 .5-.5h4a.5.5 0 0 1 .5.5v9a.5.5 0 0 1-.5.5h-4a.5.5 0 0 1-.5-.5v-9z"/>
                        <path d="M.5 3a.5.5 0 0 1 .5-.5h14a.5.5 0 0 1 0 1H.5A.5.5 0 0 1 .5 3zm2.22 1.053 1.053 11.233A1.5 1.5 0 0 0 5.26 16h5.48a1.5 1.5 0 0 0 1.488-1.714L13.28 4H2.72z"/>
                    </svg>
                </button>
            </div>
        `;
    });
}

function deleteRecord(id) {
    if (!confirm("Are you sure you want to remove this log entry?")) return;
    
    fetch(`/api/delete/${id}`, { method: 'POST' })
        .then(response => response.json())
        .then(result => {
            if (result.status === 'success') {
                // Refresh dashboard
                loadDashboardData();
            } else {
                alert("Error removing record: " + result.message);
            }
        })
        .catch(err => alert("Error removing record: " + err));
}

function clearAllHistory() {
    if (!confirm("⚠️ WARNING: This will clear ALL history logs. Proceed?")) return;
    
    fetch('/api/clear_all', { method: 'POST' })
        .then(response => response.json())
        .then(result => {
            if (result.status === 'success') {
                loadDashboardData();
            } else {
                alert("Error clearing history: " + result.message);
            }
        })
        .catch(err => alert("Error clearing history: " + err));
}

function exportToCSV() {
    if (allRecords.length === 0) {
        alert("No records to export.");
        return;
    }
    
    let csvContent = "data:text/csv;charset=utf-8,";
    csvContent += "ID,Timestamp,Message,Result,Category,Confidence (%)\n";
    
    allRecords.forEach(item => {
        const id = item.id;
        const time = item.timestamp;
        const msg = `"${item.message.replace(/"/g, '""')}"`;
        const res = item.result.toUpperCase();
        const cat = item.category ? item.category : "N/A";
        const conf = item.confidence.toFixed(1);
        
        csvContent += `${id},${time},${msg},${res},${cat},${conf}\n`;
    });
    
    const encodedUri = encodeURI(csvContent);
    const link = document.createElement("a");
    link.setAttribute("href", encodedUri);
    link.setAttribute("download", "spam_detector_history.csv");
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}

function escapeHtml(text) {
    const map = {
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
    };
    return text.replace(/[&<>"']/g, function(m) { return map[m]; });
}

// Load data when page loads
window.onload = loadDashboardData;
</script>
