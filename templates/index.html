<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Spam Detector</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }

    body {
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
    }

    .container {
      width:450px;
      padding:25px;
      border-radius:20px;
      background:rgba(255,255,255,0.1);
      backdrop-filter:blur(15px);
      box-shadow:0 8px 32px rgba(0,0,0,0.3);
      animation: float 4s ease-in-out infinite;
    }

    @keyframes float {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    h1 { text-align:center; margin-bottom:15px; }

    textarea {
      width:100%; height:100px;
      border-radius:10px; border:none;
      padding:10px; margin-bottom:10px;
      resize:none;
    }

    button {
      width:100%; padding:10px;
      border:none; border-radius:10px;
      background:linear-gradient(45deg,#00c6ff,#0072ff);
      color:white; cursor:pointer;
    }

    .result { margin-top:15px; text-align:center; }
    .spam { color:#ff4d4d; }
    .ham { color:#00ffcc; }

    .history {
      margin-top:20px;
      max-height:200px;
      overflow-y:auto;
      padding:10px;
      border-radius:10px;
      background:rgba(0,0,0,0.3);
    }

    .history-item {
      padding:8px;
      margin-bottom:8px;
      border-bottom:1px solid rgba(255,255,255,0.1);
      font-size:13px;
    }

    .label-spam { color:#ff4d4d; }
    .label-ham { color:#00ffcc; }
  </style>
</head>

<body>

<div class="container">
  <h1>🤖 AI Spam Detector</h1>

  <form action="/predict" method="POST">
    <textarea name="message" placeholder="Enter your message..."></textarea>
    <button type="submit">Analyze</button>
  </form>
  
  <br><br>
<a href="/history">
    <button>View History</button>
</a>

  {% if prediction_text %}
  <div class="result">
    <h2 class="{{ prediction_text }}">{{ prediction_text.upper() }}</h2>
    <p>Confidence: {{ confidence }}%</p>
  </div>
  {% endif %}

  <!-- History Section -->
   <div class="recent-searches">
    <h3>📜 Recent Searches</h3>

    <div id="history" class="history">
        Loading...
    </div>

</div>
  
<script>
function loadHistory() {
    fetch('/history')
        .then(response => response.json())
        .then(data => {
            let container = document.getElementById("history");

            container.innerHTML = "";

            data.forEach(item => {
                let conf = item.confidence ? item.confidence.toFixed(1) : 0;
                let labelClass = item.result.toLowerCase() === 'spam' ? 'label-spam' : 'label-ham';
                
                container.innerHTML += `
                    <div class="history-item">
                        <div style="margin-bottom: 4px;"><strong>Message:</strong> ${item.message}</div>
                        <div>
                            <strong>Result:</strong> <span class="${labelClass}">${item.result.toUpperCase()}</span> 
                            | <strong>Confidence:</strong> ${conf}%
                        </div>
                    </div>
                `;
            });
        })
        .catch(error => {
            document.getElementById("history").innerHTML = "Error loading history";
            console.error(error);
        });
}

// Load history when page loads
window.onload = loadHistory;
</script>


</body>
</html>
